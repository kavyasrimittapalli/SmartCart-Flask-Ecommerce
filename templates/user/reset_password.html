<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f6f9, #e9eef5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-container {
            background: #ffffff;
            padding: 40px 35px;
            width: 380px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 4px solid #2c7be5;
        }

        .reset-container h3 {
            margin-bottom: 25px;
            color: #2c3e50;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .reset-container input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #dce1e7;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .reset-container input[type="password"]:focus {
            outline: none;
            border-color: #2c7be5;
            box-shadow: 0 0 0 2px rgba(44,123,229,0.15);
        }

        .reset-container button {
            width: 100%;
            padding: 12px;
            background: #2c7be5;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .reset-container button:hover {
            background: #1a68d1;
        }

        .note {
            margin-top: 15px;
            font-size: 13px;
            color: #7b8a97;
        }
    </style>
</head>

<body>

    <div class="reset-container">
        <h3>Reset Password</h3>

        <form method="POST">
            <input type="password" name="password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Update Password</button>
        </form>

        <div class="note">
            Choose a strong password to keep your account secure.
        </div>
    </div>

</body>
</html>
