<!DOCTYPE html>
<html>
<head>
    <title>Payment Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#e8f5e9,#f1f8f6);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .success-card{
            width:100%;
            max-width:520px;
            background:#fff;
            border-radius:14px;
            padding:40px;
            box-shadow:0 12px 35px rgba(0,0,0,0.12);
            text-align:center;
        }

        .checkmark{
            width:80px;
            height:80px;
            background:#198754;
            color:#fff;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:40px;
            margin:0 auto 20px;
        }

        .title{
            font-size:26px;
            font-weight:700;
            color:#198754;
            margin-bottom:10px;
        }

        .subtitle{
            color:#6c757d;
            margin-bottom:25px;
        }

        .info-box{
            background:#f8f9fc;
            border-radius:10px;
            padding:15px;
            text-align:left;
            margin-bottom:25px;
        }

        .info-box p{
            margin:6px 0;
            font-size:14px;
        }

        .continue-btn{
            padding:12px 26px;
            background:linear-gradient(90deg,#2b5876,#4e4376);
            color:#fff;
            border-radius:8px;
            text-decoration:none;
            font-weight:600;
            transition:0.3s;
        }

        .continue-btn:hover{
            color:#fff;
            transform:translateY(-2px);
            box-shadow:0 6px 18px rgba(0,0,0,0.18);
        }

        @media(max-width:500px){
            .success-card{
                margin:15px;
                padding:25px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
<div class="container-fluid">

<a class="navbar-brand" href="/user/products">SmartCart</a>

<!-- MOBILE MENU BUTTON -->
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>

<!-- MENU ITEMS -->
<div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
<ul class="navbar-nav">
<li class="nav-item"><a href="/user/products" class="nav-link">View Products</a></li>

<li class="nav-item"><a href="/user/my-orders" class="nav-link">My Orders</a></li>
<li class="nav-item"><a href="/user-logout" class="nav-link logout">Logout</a></li>
</ul>
</div>

</div>
</nav>

<div class="success-card">

    <div class="checkmark">✓</div>

    <div class="title">Payment Successful!</div>
    <div class="subtitle">Your order has been confirmed.</div>

    <div class="info-box">
        <p><strong>Payment ID:</strong> {{ payment_id }}</p>
        <p><strong>Order ID:</strong> {{ order_id }}</p>
    </div>

    <a href="/user/products" class="continue-btn">
        Continue Shopping
    </a>

</div>
<footer class="footer">
     © 2026 SmartCart Pvt. Ltd.
Developed by Kavyasri Mittapalli
All rights reserved. 

</footer>

<!-- Bootstrap JS (REQUIRED for hamburger to work) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
